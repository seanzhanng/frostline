steps:
  - id: load_businesses
    sql: "SELECT * FROM BUSINESS LIMIT 10"

  - id: count_by_city
    sql: "SELECT V:city AS city, COUNT(*) FROM BUSINESS GROUP BY V:city"
    depends_on:
      - load_businesses

  - id: top_cities
    sql: "SELECT V:city AS city, COUNT(*) as cnt FROM BUSINESS GROUP BY V:city ORDER BY cnt DESC LIMIT 5"
    depends_on:
      - count_by_city